name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  repo-checks:
    name: repo-checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify required bootstrap structure
        shell: bash
        run: |
          set -euo pipefail

          required_paths=(
            "app/.gitkeep"
            "scripts/.gitkeep"
            "tests/.gitkeep"
            "platform/k3d/cluster.yaml"
            "platform/bootstrap/argocd/install.md"
            "platform/bootstrap/argocd/root-platform-application.yaml"
            "platform/bootstrap/argocd/root-applications-application.yaml"
            "applications/traderoo/k8s/base/namespace.yaml"
            "applications/traderoo/k8s/base/configmap.yaml"
            "applications/traderoo/k8s/base/kustomization.yaml"
            "applications/traderoo/k8s/overlays/local/kustomization.yaml"
            "applications/traderoo/k8s/overlays/local/configmap-patch.yaml"
            "applications/traderoo/argocd/application.yaml"
            "Makefile"
            "README.md"
            ".gitignore"
          )

          missing=0
          for path in "${required_paths[@]}"; do
            if [[ ! -e "$path" ]]; then
              echo "Missing required path: $path"
              missing=1
            fi
          done

          if [[ "$missing" -ne 0 ]]; then
            exit 1
          fi

          echo "Repository bootstrap structure check passed."

  kubernetes-manifest-checks:
    name: kubernetes-manifest-checks
    runs-on: ubuntu-latest
    needs: repo-checks
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.31.0

      - name: Render Kustomize base
        shell: bash
        run: |
          set -euo pipefail
          kubectl kustomize applications/traderoo/k8s/base > /tmp/base-rendered.yaml
          test -s /tmp/base-rendered.yaml

      - name: Render Kustomize local overlay
        shell: bash
        run: |
          set -euo pipefail
          kubectl kustomize applications/traderoo/k8s/overlays/local > /tmp/local-rendered.yaml
          test -s /tmp/local-rendered.yaml

      - name: Validate required rendered resources and safety defaults
        shell: bash
        run: |
          set -euo pipefail

          rendered="/tmp/local-rendered.yaml"

          # Parse documents as blocks so checks do not depend on key ordering.
          awk -v RS='---' '
            {
              if ($0 ~ /kind:[[:space:]]*Namespace/ && $0 ~ /name:[[:space:]]*traderoo-poc/) found_ns=1
              if ($0 ~ /kind:[[:space:]]*ConfigMap/ && $0 ~ /name:[[:space:]]*traderoo-config/ && $0 ~ /EXECUTION_MODE:[[:space:]]*PAPER_ONLY/ && $0 ~ /REVIEW_PROVIDER:[[:space:]]*mock/) found_cm=1
            }
            END {
              exit((found_ns && found_cm) ? 0 : 1)
            }
          ' "$rendered"

          echo "Kubernetes manifest checks passed."

  paper-only-policy-checks:
    name: paper-only-policy-checks
    runs-on: ubuntu-latest
    needs: repo-checks
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify no obvious live-trading/broker config in executable/config areas
        shell: bash
        run: |
          set -euo pipefail

          scan_paths=(
            "app"
            "applications"
            "platform"
            "scripts"
            "tests"
            ".github/workflows"
            "Makefile"
          )

          prohibited='live[_ -]?broker|real[_ -]?broker|broker[_ -]?credentials|api[_ -]?key.*broker|live[_ -]?order|real[_ -]?order|real[-_ ]money|margin trading|\bCFD\b|spread betting|options trading|autonomous live execution|alpaca|interactive brokers|trading212|ibkr'

          if grep -RInE --exclude=ci.yml "$prohibited" "${scan_paths[@]}"; then
            echo "Found prohibited live-trading/broker indicators in executable/config areas:"
            exit 1
          fi

          echo "Paper-only policy scan passed."
