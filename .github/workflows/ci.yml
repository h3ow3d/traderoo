name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  repo-checks:
    name: repo-checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify required bootstrap structure
        shell: bash
        run: |
          set -euo pipefail

          required_paths=(
            "app/pyproject.toml"
            "app/Dockerfile"
            "app/traderoo/__init__.py"
            "app/traderoo/config.py"
            "app/traderoo/main.py"
            "app/tests/test_config.py"
            "app/tests/test_health.py"
            "scripts/.gitkeep"
            "tests/.gitkeep"
            "platform/k3d/cluster.yaml"
            "platform/bootstrap/argocd/install.md"
            "platform/bootstrap/argocd/root-platform-application.yaml"
            "platform/charts/platform-services/Chart.yaml"
            "platform/charts/platform-services/values.yaml"
            "platform/charts/platform-services/templates/README.md"
            "platform/charts/platform-services/templates/appproject-platform.yaml"
            "platform/charts/platform-services/templates/appproject-applications.yaml"
            "platform/charts/platform-services/templates/namespaces-application-environments.yaml"
            "applications/traderoo/k8s/base/configmap.yaml"
            "applications/traderoo/k8s/base/deployment.yaml"
            "applications/traderoo/k8s/base/service.yaml"
            "applications/traderoo/k8s/base/kustomization.yaml"
            "applications/traderoo/k8s/overlays/poc/kustomization.yaml"
            "applications/traderoo/k8s/overlays/poc/configmap-patch.yaml"
            "applications/traderoo/argocd/poc.yaml"
            "Makefile"
            "README.md"
            ".gitignore"
          )

          missing=0
          for path in "${required_paths[@]}"; do
            if [[ ! -e "$path" ]]; then
              echo "Missing required path: $path"
              missing=1
            fi
          done

          if [[ "$missing" -ne 0 ]]; then
            exit 1
          fi

          echo "Repository bootstrap structure check passed."

  kubernetes-manifest-checks:
    name: kubernetes-manifest-checks
    runs-on: ubuntu-latest
    needs: repo-checks
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.31.0

      - name: Setup helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.1

      - name: Lint platform-services chart
        shell: bash
        run: |
          set -euo pipefail
          helm lint platform/charts/platform-services

      - name: Template platform-services chart
        shell: bash
        run: |
          set -euo pipefail
          helm template platform-services platform/charts/platform-services --dry-run=client | tee /tmp/platform-services.yaml >/dev/null
          grep -E "kind: AppProject|name: platform|name: traderoo-poc|kind: Namespace" /tmp/platform-services.yaml
          grep -E "name:[[:space:]]*poc|name:[[:space:]]*applications|name:[[:space:]]*traderoo-dev|name:[[:space:]]*traderoo-staging|name:[[:space:]]*traderoo-demo|name:[[:space:]]*traderoo-production" /tmp/platform-services.yaml && exit 1 || true

      - name: Render Kustomize base
        shell: bash
        run: |
          set -euo pipefail
          kubectl kustomize applications/traderoo/k8s/base > /tmp/base-rendered.yaml
          test -s /tmp/base-rendered.yaml

      - name: Render Kustomize poc overlay
        shell: bash
        run: |
          set -euo pipefail
          kubectl kustomize applications/traderoo/k8s/overlays/poc > /tmp/poc-rendered.yaml
          test -s /tmp/poc-rendered.yaml

      - name: Validate required rendered resources and safety defaults
        shell: bash
        run: |
          set -euo pipefail

          grep -E "kind:[[:space:]]*Deployment|kind:[[:space:]]*Service|name:[[:space:]]*traderoo|containerPort:[[:space:]]*8000" /tmp/poc-rendered.yaml
          grep -E "APP_ENV:[[:space:]]*poc|EXECUTION_MODE:[[:space:]]*PAPER_ONLY|REVIEW_PROVIDER:[[:space:]]*mock" /tmp/poc-rendered.yaml
          grep -E "EXECUTION_MODE:[[:space:]]*PAPER_ONLY|REVIEW_PROVIDER:[[:space:]]*mock" /tmp/poc-rendered.yaml
          grep -E "kind:[[:space:]]*Namespace" /tmp/base-rendered.yaml /tmp/poc-rendered.yaml && exit 1 || true

          echo "Kubernetes manifest checks passed."

  python-runtime-checks:
    name: python-runtime-checks
    runs-on: ubuntu-latest
    needs: repo-checks
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install runtime and test dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -e app[dev]

      - name: Run tests
        shell: bash
        run: |
          set -euo pipefail
          python -m pytest app/tests

  docker-build-checks:
    name: docker-build-checks
    runs-on: ubuntu-latest
    needs: repo-checks
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build traderoo image
        shell: bash
        run: |
          set -euo pipefail
          docker build -t traderoo:local app

  ghcr-image-build-publish:
    name: ghcr-image-build-publish
    runs-on: ubuntu-latest
    needs: repo-checks
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name != 'pull_request' && (github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/traderoo
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and optionally push GHCR image
        uses: docker/build-push-action@v6
        with:
          context: app
          file: app/Dockerfile
          push: ${{ github.event_name != 'pull_request' && (github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  paper-only-policy-checks:
    name: paper-only-policy-checks
    runs-on: ubuntu-latest
    needs: repo-checks
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify no obvious live-trading/broker config in executable/config areas
        shell: bash
        run: |
          set -euo pipefail

          scan_paths=(
            "app"
            "applications"
            "platform"
            "scripts"
            "tests"
            ".github/workflows"
            "Makefile"
          )

          prohibited='live[_ -]?broker|real[_ -]?broker|broker[_ -]?credentials|api[_ -]?key.*broker|live[_ -]?order|real[_ -]?order|real[-_ ]money|margin trading|\bCFD\b|spread betting|options trading|autonomous live execution|alpaca|interactive brokers|trading212|ibkr'

          if grep -RInE --exclude=ci.yml "$prohibited" "${scan_paths[@]}"; then
            echo "Found prohibited live-trading/broker indicators in executable/config areas:"
            exit 1
          fi

          echo "Paper-only policy scan passed."

  no-secrets-checks:
    name: no-secrets-checks
    runs-on: ubuntu-latest
    needs: repo-checks
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify no obvious plaintext secrets in executable/config areas
        shell: bash
        run: |
          set -euo pipefail

          scan_paths=(
            "app"
            "applications"
            "platform"
            "scripts"
            "tests"
            ".github/workflows"
            "Makefile"
          )

          prohibited='password:[[:space:]]|secret:[[:space:]]|api_key:[[:space:]]|token:[[:space:]]'

          if grep -RInE "$prohibited" "${scan_paths[@]}"; then
            echo "Found potential plaintext secret patterns in executable/config areas:"
            exit 1
          fi

          echo "No-secrets policy scan passed."
