name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  repo-checks:
    name: repo-checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify required bootstrap structure
        shell: bash
        run: |
          set -euo pipefail

          required_paths=(
            "app/.gitkeep"
            "scripts/.gitkeep"
            "tests/.gitkeep"
            "platform/k3d/cluster.yaml"
            "platform/bootstrap/argocd/install.md"
            "platform/bootstrap/argocd/root-platform-application.yaml"
            "platform/charts/platform-services/Chart.yaml"
            "platform/charts/platform-services/values.yaml"
            "platform/charts/platform-services/templates/README.md"
            "platform/charts/platform-services/templates/appproject-platform.yaml"
            "platform/charts/platform-services/templates/appproject-applications.yaml"
            "platform/charts/platform-services/templates/namespaces-application-environments.yaml"
            "applications/traderoo/k8s/base/configmap.yaml"
            "applications/traderoo/k8s/base/kustomization.yaml"
            "applications/traderoo/k8s/overlays/poc/kustomization.yaml"
            "applications/traderoo/k8s/overlays/poc/configmap-patch.yaml"
            "applications/traderoo/argocd/poc.yaml"
            "Makefile"
            "README.md"
            ".gitignore"
          )

          missing=0
          for path in "${required_paths[@]}"; do
            if [[ ! -e "$path" ]]; then
              echo "Missing required path: $path"
              missing=1
            fi
          done

          if [[ "$missing" -ne 0 ]]; then
            exit 1
          fi

          echo "Repository bootstrap structure check passed."

  kubernetes-manifest-checks:
    name: kubernetes-manifest-checks
    runs-on: ubuntu-latest
    needs: repo-checks
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.31.0

      - name: Setup helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.1

      - name: Lint platform-services chart
        shell: bash
        run: |
          set -euo pipefail
          helm lint platform/charts/platform-services

      - name: Template platform-services chart
        shell: bash
        run: |
          set -euo pipefail
          helm template platform-services platform/charts/platform-services --dry-run=client | tee /tmp/platform-services.yaml >/dev/null
          grep -E "kind: AppProject|name: platform|name: traderoo-poc|kind: Namespace" /tmp/platform-services.yaml
          grep -E "name:[[:space:]]*poc|name:[[:space:]]*applications|name:[[:space:]]*traderoo-dev|name:[[:space:]]*traderoo-staging|name:[[:space:]]*traderoo-demo|name:[[:space:]]*traderoo-production" /tmp/platform-services.yaml && exit 1 || true

      - name: Render Kustomize base
        shell: bash
        run: |
          set -euo pipefail
          kubectl kustomize applications/traderoo/k8s/base > /tmp/base-rendered.yaml
          test -s /tmp/base-rendered.yaml

      - name: Render Kustomize poc overlay
        shell: bash
        run: |
          set -euo pipefail
          kubectl kustomize applications/traderoo/k8s/overlays/poc > /tmp/poc-rendered.yaml
          test -s /tmp/poc-rendered.yaml

      - name: Validate required rendered resources and safety defaults
        shell: bash
        run: |
          set -euo pipefail

          grep -E "EXECUTION_MODE:[[:space:]]*PAPER_ONLY|REVIEW_PROVIDER:[[:space:]]*mock" /tmp/poc-rendered.yaml
          grep -E "kind:[[:space:]]*Namespace" /tmp/base-rendered.yaml /tmp/poc-rendered.yaml && exit 1 || true

          echo "Kubernetes manifest checks passed."

  paper-only-policy-checks:
    name: paper-only-policy-checks
    runs-on: ubuntu-latest
    needs: repo-checks
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify no obvious live-trading/broker config in executable/config areas
        shell: bash
        run: |
          set -euo pipefail

          scan_paths=(
            "app"
            "applications"
            "platform"
            "scripts"
            "tests"
            ".github/workflows"
            "Makefile"
          )

          prohibited='live[_ -]?broker|real[_ -]?broker|broker[_ -]?credentials|api[_ -]?key.*broker|live[_ -]?order|real[_ -]?order|real[-_ ]money|margin trading|\bCFD\b|spread betting|options trading|autonomous live execution|alpaca|interactive brokers|trading212|ibkr'

          if grep -RInE --exclude=ci.yml "$prohibited" "${scan_paths[@]}"; then
            echo "Found prohibited live-trading/broker indicators in executable/config areas:"
            exit 1
          fi

          echo "Paper-only policy scan passed."
