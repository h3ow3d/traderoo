apiVersion: apps/v1
kind: Deployment
metadata:
  name: traderoo
  labels:
    app.kubernetes.io/name: traderoo
    app.kubernetes.io/part-of: traderoo
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: traderoo
  template:
    metadata:
      labels:
        app.kubernetes.io/name: traderoo
        app.kubernetes.io/part-of: traderoo
    spec:
      containers:
        - name: traderoo
          image: traderoo:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: traderoo-config
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
