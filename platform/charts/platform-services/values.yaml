argocdNamespace: argocd

projects:
  platform:
    enabled: true
    name: platform
    description: Platform-owned services and guardrails.
    sourceRepos:
      - "*"
    destinations:
      - namespace: argocd
        server: https://kubernetes.default.svc
      - namespace: vault
        server: https://kubernetes.default.svc
      - namespace: external-secrets
        server: https://kubernetes.default.svc
    clusterResourceWhitelist:
      - group: "*"
        kind: "*"

  applications:
    enabled: true
    name: applications
    description: Application-owned deployments only.
    sourceRepos:
      - "*"
    destinations:
      - namespace: traderoo-poc
        server: https://kubernetes.default.svc
    clusterResourceWhitelist:
      - group: "*"
        kind: "*"
