apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-platform
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/h3ow3d/traderoo.git
    targetRevision: HEAD
    path: platform/charts/platform-services
    helm:
      releaseName: platform-services
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
